# Portainer / remote stack deploy: builds from your GitHub repo (no GHCR pull required).
services:
  geospatial-data-converter:
    build:
      context: https://github.com/AdventureSeeker423/geospatial-data-converter.git#main
      dockerfile: Dockerfile
      target: runtime
    container_name: geospatial-data-converter
    ports:
      - "7860:7860"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7860/_stcore/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
