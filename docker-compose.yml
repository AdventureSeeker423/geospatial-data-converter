services:
  geospatial-data-converter:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "127.0.0.1:${APP_PORT:-7860}:7860"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7860/_stcore/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
