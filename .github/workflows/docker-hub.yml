name: Container Image

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/docker-hub.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "docker-compose.yml"
      - "docker-compose.test.yml"
      - "pyproject.toml"
      - "geospatial-data-converter/**"
  push:
    branches: [main]
    tags:
      - '*.*.*'
    paths:
      - ".github/workflows/docker-hub.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "docker-compose.yml"
      - "docker-compose.test.yml"
      - "pyproject.toml"
      - "geospatial-data-converter/**"
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Release image tag to publish, e.g. 1.2.1'
        required: false
        type: string
      publish:
        description: 'Push the image to GitHub Container Registry'
        required: true
        default: false
        type: boolean

env:
  IMAGE_NAME: ghcr.io/adventureseeker423/geospatial-data-converter

jobs:
  verify-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      project_version: ${{ steps.meta.outputs.project_version }}
      publish_image: ${{ steps.meta.outputs.publish_image }}
      publish_latest: ${{ steps.meta.outputs.publish_latest }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Resolve image metadata
      id: meta
      env:
        EVENT_NAME: ${{ github.event_name }}
        INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        INPUT_PUBLISH: ${{ inputs.publish }}
        REF_NAME: ${{ github.ref_name }}
      run: |
        python - <<'PY'
        import os
        import pathlib
        import tomllib

        version = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
        event_name = os.environ["EVENT_NAME"]
        input_image_tag = os.environ.get("INPUT_IMAGE_TAG", "")
        input_publish = os.environ.get("INPUT_PUBLISH", "false").lower() == "true"
        ref_name = os.environ.get("REF_NAME", "")

        image_tag = input_image_tag or version
        publish_image = "false"
        publish_latest = "false"

        if event_name == "push" and ref_name != "main":
            if ref_name != version:
                raise SystemExit(f"Tag {ref_name!r} does not match project version {version!r}")
            image_tag = ref_name
            publish_image = "true"
            publish_latest = "true" if "-" not in ref_name else "false"
        elif event_name == "workflow_dispatch":
            if input_publish:
                if not input_image_tag:
                    raise SystemExit("workflow_dispatch with publish=true requires image_tag")
                if input_image_tag != version:
                    raise SystemExit(f"Manual image tag {input_image_tag!r} does not match project version {version!r}")
                publish_image = "true"
                publish_latest = "true" if "-" not in input_image_tag else "false"
            else:
                image_tag = input_image_tag or f"dry-run-{version}"

        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            fh.write(f"project_version={version}\n")
            fh.write(f"image_tag={image_tag}\n")
            fh.write(f"publish_image={publish_image}\n")
            fh.write(f"publish_latest={publish_latest}\n")
        PY

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build runtime image
      uses: docker/build-push-action@v7
      with:
        context: .
        target: runtime
        load: true
        push: false
        build-args: |
          VERSION=${{ steps.meta.outputs.project_version }}
          VCS_REF=${{ github.sha }}
          BUILD_DATE=${{ github.event.head_commit.timestamp || github.run_id }}
        tags: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}

    - name: Smoke test runtime image
      env:
        IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        PROJECT_VERSION: ${{ steps.meta.outputs.project_version }}
      run: |
        test "$(docker inspect --format '{{.Config.User}}' "$IMAGE_NAME:$IMAGE_TAG")" = "appuser"
        test "$(docker inspect --format '{{index .Config.Labels "org.opencontainers.image.version"}}' "$IMAGE_NAME:$IMAGE_TAG")" = "$PROJECT_VERSION"
        docker run --rm --entrypoint python "$IMAGE_NAME:$IMAGE_TAG" -c "import importlib.metadata; print(importlib.metadata.version('geospatial-data-converter'))"
        docker run -d --rm --name geospatial-data-converter-release-smoke -p 7860:7860 "$IMAGE_NAME:$IMAGE_TAG"
        python - <<'PY'
        import time
        import urllib.request

        last_error = None
        for _ in range(30):
            try:
                with urllib.request.urlopen("http://127.0.0.1:7860/_stcore/health", timeout=5) as response:
                    body = response.read().decode("utf-8").strip()
                if body == "ok":
                    break
            except Exception as exc:
                last_error = exc
                time.sleep(1)
        else:
            raise SystemExit(f"runtime health check failed: {last_error}")
        PY
        docker rm -f geospatial-data-converter-release-smoke

  publish-image:
    runs-on: ubuntu-latest
    needs: verify-image
    if: needs.verify-image.outputs.publish_image == 'true'
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push release image
      uses: docker/build-push-action@v7
      with:
        context: .
        target: runtime
        push: true
        build-args: |
          VERSION=${{ needs.verify-image.outputs.project_version }}
          VCS_REF=${{ github.sha }}
          BUILD_DATE=${{ github.event.head_commit.timestamp || github.run_id }}
        tags: |
          ${{ env.IMAGE_NAME }}:${{ needs.verify-image.outputs.image_tag }}
          ${{ needs.verify-image.outputs.publish_latest == 'true' && format('{0}:latest', env.IMAGE_NAME) || '' }}
