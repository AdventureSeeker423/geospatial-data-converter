name: Push to HuggingFace Space

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/hf-space.yml"
      - "Dockerfile"
      - "README.md"
      - "pyproject.toml"
      - "geospatial-data-converter/**"
  workflow_dispatch:

jobs:
  push-to-huggingface:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Push to HuggingFace Space
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        git push "https://AdventureSeeker423:${HF_TOKEN}@huggingface.co/spaces/AdventureSeeker423/geospatial-data-converter" main
